<div class="login-container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-card">
    <h2>Iniciar Sesión</h2>
    
    <div class="form-group">
      <label for="username">Usuario</label>
      <input id="username" type="text" formControlName="username" placeholder="Tu username de Prisma">
      <small *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
        El usuario es requerido (mín. 3 caracteres).
      </small>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input id="password" type="password" formControlName="password" placeholder="********">
      <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        La contraseña debe tener al menos 6 caracteres.
      </small>
    </div>

    <button type="submit" [disabled]="loginForm.invalid">Entrar</button>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </form>
</div>
